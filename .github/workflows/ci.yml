name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: CLEAR Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Make scripts executable
        run: |
          chmod +x clear/verify-ci.sh clear/verify-local.sh
          chmod +x scripts/*.sh

      - name: CLEAR — Verify CI
        run: ./clear/verify-ci.sh

      - name: Shellcheck (scripts quality)
        run: shellcheck --severity=error scripts/*.sh clear/verify-ci.sh clear/verify-local.sh
