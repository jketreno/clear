# =============================================================================
# CLEAR autonomy.yml — Module Autonomy Boundaries
# =============================================================================
# CLEAR Principle: [L] Limited — Define where AI works alone vs with humans
#
# This is a generic starter template for bootstrapped projects.
# Update module paths and reasons for your repository.
#
# Levels:
#   full-autonomy  — AI can read, modify, and regenerate freely
#   supervised     — AI generates code, but human must review before commit
#   humans-only    — AI must NOT generate code; flag for human attention
# =============================================================================

project: "your-project"

modules:
  - path: "clear/verify-ci.sh"
    level: humans-only
    reason: "CLEAR-owned enforcement script; modify intentionally with human review"

  - path: "clear/verify-local.sh"
    level: supervised
    reason: "Project-specific checks; AI may draft but human should review"

  - path: "*"
    level: supervised
    reason: "Default: untagged modules require human review"

# =============================================================================
# Reality Alignment — Sources of Truth
# =============================================================================
# Add project-specific concepts after bootstrap.
#
# Example:
# sources_of_truth:
#   - concept: "Customer identity"
#     source_of_truth: "Auth provider claims"
#     defined_in: "infra/auth"
#     note: "Provider claims win when app model differs"

sources_of_truth: []
