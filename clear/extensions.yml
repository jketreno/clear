# =============================================================================
# CLEAR extensions.yml — Optional Tool Extensions
# =============================================================================
# CLEAR Principle: [C] Constrained — extend enforcement with optional tools
#
# Extensions are optional checks that verify-ci.sh runs when enabled.
# Each extension wraps an external tool (e.g., Lizard for cyclomatic complexity).
#
# This file is PROJECT-OWNED — CLEAR updates will never overwrite it.
# Enable/disable extensions by setting enabled: true/false below.
#
# If an enabled extension's tool is not installed, verify-ci.sh will fail
# with instructions on how to install it or disable the extension.
# =============================================================================

extensions:

  # ── Lizard — Cyclomatic Complexity ────────────────────────────────────────
  # Lizard analyzes cyclomatic complexity across 16+ languages (C/C++, Java,
  # Python, JavaScript, TypeScript, Go, Rust, and more). It flags functions
  # that are too complex to maintain or test reliably.
  #
  # Install: pip install lizard
  # Project: https://github.com/terryyin/lizard
  #
  - name: lizard
    enabled: false
    description: "Cyclomatic complexity analysis (16+ languages)"
    command: "lizard"
    install_hint: "pip install lizard"
    project_url: "https://github.com/terryyin/lizard"
    # Customize these for your project:
    options:
      # Maximum cyclomatic complexity per function (default: 15)
      threshold: 15
      # Paths to analyze (space-separated, relative to project root)
      paths: "src"
      # Extra flags passed directly to lizard (e.g., "--languages python javascript")
      extra_flags: "--warnings_only"

  # ── File Size — Component / File Length Limits ───────────────────────────
  # Catches the "one giant file" problem — especially common in React/TSX
  # where AI piles everything into a single component. No external tool
  # required; uses built-in line counting.
  #
  # When a file exceeds the limit, verify-ci.sh fails with the file path
  # and line count, so the AI knows exactly what to split.
  #
  # For React projects: pair this with templates/linting/eslint-react.config.js
  # which adds per-function and nesting-depth limits via ESLint.
  #
  - name: file-size
    enabled: false
    description: "File length limits — catches oversized components and modules"
    command: "wc"
    install_hint: "Built-in (no install needed)"
    project_url: ""
    options:
      # Maximum lines per file (default: 300). Files over this limit fail.
      # Recommended starting points:
      #   React/TSX components: 250
      #   TypeScript modules:   400
      #   General:              300
      threshold: 300
      # File extensions to check (space-separated)
      # Common sets:
      #   React:   "tsx jsx"
      #   Full-stack TS: "ts tsx jsx"
      #   Python:  "py"
      #   Go:      "go"
      file_types: "ts tsx jsx"
      # Paths to scan (space-separated, relative to project root)
      paths: "src"
      # Paths to exclude (space-separated glob patterns)
      exclude: "*.test.* *.spec.* *.stories.* *.d.ts generated"
